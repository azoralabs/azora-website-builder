# The IDE/Gradle sync for this project resolves the whole azora-studio composite
# build (includeBuild("../azora-studio")), which is a large Kotlin Multiplatform
# project. The default Gradle daemon heap (512M) runs out of memory during sync,
# producing an OOM heap dump and leaving the IDE unable to load the project.
# Mirror azora-studio's memory settings so the root daemon has enough heap.
org.gradle.jvmargs=-Xmx4096M -Dfile.encoding=UTF-8
kotlin.daemon.jvmargs=-Xmx3072M
org.gradle.caching=true
